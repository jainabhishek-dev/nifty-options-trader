<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Auto-Lock | Nifty Options Trader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B6B 0%, #C92A2A 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 20px rgba(201, 42, 42, 0.3);
        }

        .icon-container i {
            font-size: 2rem;
            color: #ffffff;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-bottom: 2.5rem;
        }

        .form-control-dark {
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 3px;
            padding: 0.8rem;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .form-control-dark:focus {
            background-color: rgba(0, 0, 0, 0.6);
            border-color: #FF6B6B;
            box-shadow: 0 0 0 0.25rem rgba(255, 107, 107, 0.25);
            color: #ffffff;
        }

        .form-control-dark::placeholder {
            color: #6c757d;
            letter-spacing: normal;
            font-size: 1rem;
        }

        .btn-unlock {
            background: linear-gradient(135deg, #FF6B6B 0%, #C92A2A 100%);
            border: none;
            color: white;
            padding: 0.8rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            width: 100%;
            margin-top: 1.5rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-unlock:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(201, 42, 42, 0.4);
        }

        .btn-unlock:active {
            transform: translateY(0);
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
        }

        .custom-toast {
            background: rgba(220, 53, 69, 0.9);
            color: white;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <!-- Toast Notifications for Errors -->
    <div class="toast-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="toast custom-toast align-items-center show" role="alert" aria-live="assertive" aria-atomic="true">
                    <div class="d-flex">
                        <div class="toast-body">
                            <i class="fas fa-exclamation-circle me-2"></i>{{ message }}
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <!-- Login Card -->
    <div class="login-wrapper">
        <div class="icon-container">
            <i class="fas fa-lock"></i>
        </div>
        <h2 class="login-title">Platform Locked</h2>
        <p class="login-subtitle">Enter your secure PIN to access the trading terminal Engine operates securely in background.</p>

        <form action="{{ url_for('platform_login') }}" method="POST">
            <div class="form-group">
                <input type="password" 
                       name="password" 
                       class="form-control form-control-dark" 
                       placeholder="Enter PIN / Password" 
                       autocomplete="current-password"
                       autofocus
                       required>
            </div>
            <button type="submit" class="btn btn-unlock">
                <i class="fas fa-unlock me-2"></i> Unlock Terminal
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-dismiss toasts after 5 seconds
        document.addEventListener('DOMContentLoaded', function() {
            var toasts = document.querySelectorAll('.toast');
            toasts.forEach(function(toastNode) {
                var toast = new bootstrap.Toast(toastNode, {delay: 5000});
                toast.show();
            });
        });
    </script>
</body>
</html>
